<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Coinflip - CasiNow</title>
<link rel="stylesheet" href="/static/style.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
<nav class="navbar">
  <div class="nav-left"><a href="/" class="logo">&#127922; CasiNow</a></div>
  <div class="nav-right">
    <div class="balance-box"><span class="coin-icon">&#129689;</span><span id="balance-amount">0</span></div>
    <div class="user-info"><img id="user-avatar" class="avatar" src="" alt=""><span id="user-name"></span><a href="/logout" class="btn-logout">Deco</a></div>
  </div>
</nav>
<div class="game-page">
  <div class="sidebar">
    <div class="sidebar-label">JEUX</div>
    <a href="/game/plinko" class="sidebar-item">&#127919; Plinko</a>
    <a href="/game/mines" class="sidebar-item">&#128163; Mines</a>
    <a href="/game/slots" class="sidebar-item">&#127922; Slots</a>
    <a href="/game/coinflip" class="sidebar-item active">&#129689; Coinflip</a>
    <a href="/game/blackjack" class="sidebar-item">&#127183; Blackjack</a>
  </div>
  <div class="game-content">
    <h1 class="game-title">&#129689; Coinflip</h1>
    <div class="bet-panel">
      <div class="bet-row">
        <label>Mise</label>
        <input type="number" id="bet" class="bet-input" value="100" min="1">
        <div class="quick-bets">
          <button class="quick-bet" onclick="document.getElementById('bet').value=100">100</button>
          <button class="quick-bet" onclick="document.getElementById('bet').value=500">500</button>
          <button class="quick-bet" onclick="document.getElementById('bet').value=1000">1K</button>
        </div>
      </div>
    </div>
    <div class="coinflip-area">
      <div id="coin" class="coin">&#129689;</div>
      <div style="display:flex;gap:12px;justify-content:center;margin-top:16px">
        <button class="btn-primary" onclick="flip('heads')">&#129689; Face</button>
        <button class="btn-danger" onclick="flip('tails')">&#127915; Pile</button>
      </div>
    </div>
    <div id="result" class="result-box" style="display:none"></div>
  </div>
</div>
<script>
var bal=0,flipping=false;
fetch('/api/me').then(r=>r.ok?r.json():null).then(d=>{
  if(!d){location.href='/';return;}
  bal=d.balance;
  document.getElementById('balance-amount').textContent=d.balance;
  document.getElementById('user-avatar').src=d.avatar;
  document.getElementById('user-name').textContent=d.username;
});

function flip(choice){
  var bet=parseInt(document.getElementById('bet').value);
  if(bet<=0||bet>bal||flipping)return;
  flipping=true;
  document.getElementById('result').style.display='none';
  var coin=document.getElementById('coin');
  // Animate
  var frames=['&#129689;','&#127915;','&#129689;','&#127915;','&#129689;','&#127915;'];
  var i=0;
  var anim=setInterval(function(){
    coin.innerHTML=frames[i%frames.length];i++;
  },150);
  fetch('/api/coinflip',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({bet,choice})})
  .then(r=>r.json()).then(d=>{
    if(d.error){alert(d.error);flipping=false;clearInterval(anim);return;}
    setTimeout(function(){
      clearInterval(anim);
      coin.innerHTML = d.result==='heads' ? '&#129689;' : '&#127915;';
      bal=d.balance;
      document.getElementById('balance-amount').textContent=d.balance;
      var res=document.getElementById('result');
      res.style.display='block';
      var resultName = d.result==='heads' ? 'Face' : 'Pile';
      var choiceName = choice==='heads' ? 'Face' : 'Pile';
      if(d.won){
        res.innerHTML='<div class="result-win">'+resultName+' ! Tu avais choisi '+choiceName+'. +'+d.profit+' &#129689;</div>';
      } else {
        res.innerHTML='<div class="result-lose">'+resultName+' ! Tu avais choisi '+choiceName+'. '+d.profit+' &#129689;</div>';
      }
      flipping=false;
    },1500);
  });
}
</script>
</body>
</html>
