<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Slots - CasiNow</title>
<link rel="stylesheet" href="/static/style.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
<nav class="navbar">
  <div class="nav-left"><a href="/" class="logo">&#127922; CasiNow</a></div>
  <div class="nav-right">
    <div class="balance-box"><span class="coin-icon">&#129689;</span><span id="balance-amount">0</span></div>
    <div class="user-info"><img id="user-avatar" class="avatar" src="" alt=""><span id="user-name"></span><a href="/logout" class="btn-logout">Deco</a></div>
  </div>
</nav>
<div class="game-page">
  <div class="sidebar">
    <div class="sidebar-label">JEUX</div>
    <a href="/game/plinko" class="sidebar-item">&#127919; Plinko</a>
    <a href="/game/mines" class="sidebar-item">&#128163; Mines</a>
    <a href="/game/slots" class="sidebar-item active">&#127922; Slots</a>
    <a href="/game/coinflip" class="sidebar-item">&#129689; Coinflip</a>
    <a href="/game/blackjack" class="sidebar-item">&#127183; Blackjack</a>
  </div>
  <div class="game-content">
    <h1 class="game-title">&#127922; Slots</h1>
    <div class="bet-panel">
      <div class="bet-row">
        <label>Mise</label>
        <input type="number" id="bet" class="bet-input" value="100" min="1">
        <div class="quick-bets">
          <button class="quick-bet" onclick="document.getElementById('bet').value=100">100</button>
          <button class="quick-bet" onclick="document.getElementById('bet').value=500">500</button>
          <button class="quick-bet" onclick="document.getElementById('bet').value=1000">1K</button>
        </div>
        <button class="btn-primary" id="spinBtn" onclick="spin()">Tourner !</button>
      </div>
    </div>
    <div class="slots-display" id="slotsDisplay">
      <div class="reel" id="r0"><div class="reel-cell">&#127922;</div><div class="reel-cell middle">&#127922;</div><div class="reel-cell">&#127922;</div></div>
      <div class="reel" id="r1"><div class="reel-cell">&#127922;</div><div class="reel-cell middle">&#127922;</div><div class="reel-cell">&#127922;</div></div>
      <div class="reel" id="r2"><div class="reel-cell">&#127922;</div><div class="reel-cell middle">&#127922;</div><div class="reel-cell">&#127922;</div></div>
    </div>
    <div id="result" class="result-box" style="display:none"></div>
  </div>
</div>
<script>
var bal=0,spinning=false;
fetch('/api/me').then(r=>r.ok?r.json():null).then(d=>{
  if(!d){location.href='/';return;}
  bal=d.balance;
  document.getElementById('balance-amount').textContent=d.balance;
  document.getElementById('user-avatar').src=d.avatar;
  document.getElementById('user-name').textContent=d.username;
});

function spin(){
  var bet=parseInt(document.getElementById('bet').value);
  if(bet<=0||bet>bal||spinning){return;}
  spinning=true;
  document.getElementById('spinBtn').disabled=true;
  document.getElementById('result').style.display='none';
  // Animate
  var t=0,anim=setInterval(function(){
    var syms=['&#127826;','&#127819;','&#128276;','&#11088;','&#128142;','7'];
    for(var i=0;i<3;i++){
      var r=document.getElementById('r'+i);
      var cells=r.querySelectorAll('.reel-cell');
      cells.forEach(function(c){c.textContent=syms[Math.floor(Math.random()*syms.length)];});
    }
    t++;
    if(t>10)clearInterval(anim);
  },80);
  fetch('/api/slots',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({bet})})
  .then(r=>r.json()).then(d=>{
    if(d.error){alert(d.error);spinning=false;document.getElementById('spinBtn').disabled=false;return;}
    setTimeout(function(){
      clearInterval(anim);
      for(var i=0;i<3;i++){
        var r=document.getElementById('r'+i);
        var cells=r.querySelectorAll('.reel-cell');
        cells[0].textContent=d.reels[i][0];
        cells[1].textContent=d.reels[i][1];
        cells[2].textContent=d.reels[i][2];
      }
      bal=d.balance;
      document.getElementById('balance-amount').textContent=d.balance;
      var res=document.getElementById('result');
      res.style.display='block';
      if(d.winnings>0){
        res.innerHTML='<div class="result-win">+'+d.profit+' &#129689; ! Ligne: '+d.middle.join(' ')+'</div>';
      } else {
        res.innerHTML='<div class="result-lose">-'+bet+' &#129689;. Ligne: '+d.middle.join(' ')+'</div>';
      }
      spinning=false;
      document.getElementById('spinBtn').disabled=false;
    },1000);
  });
}
</script>
</body>
</html>
